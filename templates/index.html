<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconhecimento Facial</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {% for message in messages %}
            <p>{{ message }}</p>
          {% endfor %}
          <a href="/" class="btn-voltar">OK, voltar</a>
        </div>
      {% endif %}
    {% endwith %}
    
    <div class="container">
        <h1>Sistema de Reconhecimento</h1>
        
        <div class="card">
            <h2>1. Cadastrar Novo Rosto</h2>
            <form action="/cadastrar" method="POST" enctype="multipart/form-data">
                <input type="text" name="nome" placeholder="Nome da pessoa" required>
                <input type="file" name="imagem" accept="image/*" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <div class="card">
            <h2>2. Reconhecer Rosto</h2>
            <form action="/reconhecer" method="POST" enctype="multipart/form-data">
                <input type="file" name="imagem" accept="image/*" capture="camera" required>
                <button type="submit" class="btn-reconhecer">Quem é?</button>
            </form>
        </div>
    </div>
</body>
</html>
